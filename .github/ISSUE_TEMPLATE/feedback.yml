name: 피드백 / 버그 제보
description: 증강 오목 플레이 중 발견한 버그나 아이디어를 남겨주세요
title: "[피드백] "
labels: ["feedback"]
body:
  - type: textarea
    id: description
    attributes:
      label: 무슨 일이 있었나요?
      description: 버그라면 어떤 상황에서 어떻게 됐는지, 아이디어/건의라면 어떤 걸 원하는지 최대한 자세히 적어주세요.
      placeholder: 예) 프리즘 카드 "인과응보"를 뽑았는데 3번째로 돌이 제거당해도 발동하지 않았어요.
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: 플레이 모드
      options:
        - 로컬 대전
        - 온라인 대전
        - 싱글플레이 (AI)
        - 해당 없음
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법 (버그인 경우)
      description: 어떤 순서로 하면 재현되는지 적어주시면 더 빨리 고칠 수 있어요.
  - type: textarea
    id: extra
    attributes:
      label: 스크린샷/기타
      description: 스크린샷이 있다면 여기에 붙여넣어 주세요.
